name: Deploy fastAPI server

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ghcr.io/anbj1004/heydi-ai
  VERSION: ${{ github.sha }}
  NAME: heydi-ai-container
  ENV_FILE: /home/ubuntu/fastAPI_env/.docker_env
  DOTENV_FILE: /home/ubuntu/fastAPI_env/.env
  
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Cache docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.VERSION }}
          restore-keys: |
            ${{ runner.os }}-buildx-
            
      - name: Login to ghcr
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    needs: build
    name: Deploy
    runs-on: [ self-hosted, main-runner ]

    steps:
      - name: Login to ghcr
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Docker run
        run: |
          docker stop ${{ env.NAME }} && docker rm ${{ env.NAME }} && docker rmi ${{ env.DOCKER_IMAGE }}:latest
          docker create --network host --name ${{ env.NAME }} --env-file ${{ env.ENV_FILE }} ${{ env.DOCKER_IMAGE }}:latest
          docker cp ${{ env.DOTENV_FILE }} ${{ env.NAME }}:/code/.env
          docker start ${{ env.NAME }}
